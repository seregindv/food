<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎅 YoFood</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="index.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kablammo&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="radio.css">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">

</head>

<body>
  <div id="currentDate" style="font-size: 12px; margin-bottom: 15px; color: #004156;"></div>
  <button id="toggleSnowflakes"></button>
  <div class="titleContainer">
    <img class="maskotImg" src="./mascot.png" />
    <h1>YoFood</h1>

  </div>

  <div id="uploadContainer">
    <input type="text" id="sheetLinkInput" autocomplete="off" placeholder="Вставьте ссылку на Google Таблицу">
    <button id="uploadBtn">Загрузить</button>
  </div>
  <div class="sheet-title">
    <div id="sheetStatus" class="date-icon inline"></div>
    <div id="sheetTitle" class="inline"></div>
  </div>
  <div id="selectContainer">
    <div class="selectWrapper">

      <div class="day">
        <div>
          <input id="1" type="radio" class="day" name="day" value="Пн">
          <label for="1">Пн</label>
        </div>
        <div>
          <input id="2" type="radio" class="day" name="day" value="Вт">
          <label for="2">Вт</label>
        </div>
        <div>
          <input id="3" type="radio" class="day" name="day" value="Ср">
          <label for="3">Ср</label>
        </div>
        <div>
          <input id="4" type="radio" class="day" name="day" value="Чт">
          <label for="4">Чт</label>
        </div>
        <div>
          <input id="5" type="radio" class="day" name="day" value="Пт">
          <label for="5">Пт</label>
        </div>
      </div>
      <select id="employeeSelect">
        <option value="">Выберите сотрудника</option>
      </select>
    </div>
  </div>
  <div class="loader" id="loader"></div>
  <div id="jsonDisplay"></div>
  <a id="compareButton" target="_blank">Сверить с таблицей</a>
  <div class="error" id="errorDisplay"></div>
</body>

</html>
