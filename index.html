<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎅 Food</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="js/index.js" type="module" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kablammo&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="radio.css">
</head>

<body>
  <div class="refresh">
    <div class="refresh-loader"></div>
    <svg xmlns="http://www.w3.org/2000/svg" class="refresh-arrow" viewBox="0 0 115.4 122.88">
      <path
        d="M24.94,67.88A14.66,14.66,0,0,1,4.38,47L47.83,4.21a14.66,14.66,0,0,1,20.56,0L111,46.15A14.66,14.66,0,0,1,90.46,67.06l-18-17.69-.29,59.17c-.1,19.28-29.42,19-29.33-.25L43.14,50,24.94,67.88Z" />
    </svg>
  </div>
  <div class="main">
    <div class="title-container">
      <div class="mascot">
        <img />
      </div>
      <div class="sheet-dates rect-radios" id="sheetDates"></div>
      <button id="showSettings" style="margin-left: 6px" class="transparent-button bordered texted content-updated">
        <div class="animated-rotate">+</div>
      </button>
    </div>

    <div class="employee-select">
      <select id="employeeSelect" class="link-select flex-stretch">
        <option value="">Выберите сотрудника</option>
      </select>
    </div>

    <div id="settings" class="hidden">
      <div id="uploadContainer">
        <input type="search" id="sheetLinkInput" autocomplete="off" placeholder="Ссылка на Google-таблицу">
        <div class="flex gap-8">
          <button id="uploadBtn">Загрузить</button>
          <div class="loader-panel flex flex-stretch invisible">
            <img src="excel.svg" height="32">
            <div class="loader">
            </div>
            <img src="fridge.svg" height="62">
          </div>
        </div>
      </div>
    </div>

    <template id="sheetDate">
      <div class="sheet-date">
        <input type="radio">
        <label></label>
        <div>
          <div class="content"></div>
          <div class="header"></div>
        </div>
      </div>
    </template>

    <div class="error" id="errorDisplay"></div>

    <div id="selectContainer">
      <div class="select-wrapper">
        <div class="days rect-radios">
          <div>
            <input id="1" type="radio" name="day" value="пн">
            <label for="1">Пн</label>
          </div>
          <div>
            <input id="2" type="radio" name="day" value="вт">
            <label for="2">Вт</label>
          </div>
          <div>
            <input id="3" type="radio" name="day" value="ср">
            <label for="3">Ср</label>
          </div>
          <div>
            <input id="4" type="radio" name="day" value="чт">
            <label for="4">Чт</label>
          </div>
          <div>
            <input id="5" type="radio" name="day" value="пт">
            <label for="5">Пт</label>
          </div>
        </div>
      </div>
    </div>

    <div id="jsonDisplay">
      <div class="values-list hidden">
        <template id="meal-template">
          <div class="meal">
            <input type="checkbox" id="meal1" name="meal" />
            <label for="meal1" class="meal-name">
              <div></div>
              <div></div>
            </label>
          </div>
        </template>
        <div class="meals">
        </div>
        <div style="text-align: right; margin-top: 20px; display: flex">
          <button id="shareEatIt" class="transparent-button glow" style="margin-left: 50%; transform: translateX(-50%)">
            <svg viewBox="9 10 33 30" xmlns="http://www.w3.org/2000/svg" class="stroked">
              <path
                d="M15 30c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z" />
              <path
                d="M35 20c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z" />
              <path
                d="M35 40c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z" />
              <path d="M19.007 25.885l12.88 6.44-.895 1.788-12.88-6.44z" />
              <path d="M30.993 15.885l.894 1.79-12.88 6.438-.894-1.79z" />
            </svg>
          </button>
          <button id="copyEatIt" class="transparent-button glow" style="margin-left: auto">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path
                d="M16,20H5V6H3v14c0,1.1,0.9,2,2,2h11V20z M20,16V4c0-1.1-0.9-2-2-2H9C7.9,2,7,2.9,7,4v12c0,1.1,0.9,2,2,2h9 C19.1,18,20,17.1,20,16z M18,16H9V4h9V16z">
              </path>
            </svg>
          </button>
        </div>
        <div id="noData" class="hidden"></div>
      </div>

    </div>
</body>

</html>
