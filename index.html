<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎅 YoFood</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="js/index.js" type="module" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kablammo&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="radio.css">
</head>

<body>
  <div class="refresh" style="height: 0">
    <svg xmlns="http://www.w3.org/2000/svg" class="refresh-arrow" viewBox="0 0 115.4 122.88">
      <path
        d="M24.94,67.88A14.66,14.66,0,0,1,4.38,47L47.83,4.21a14.66,14.66,0,0,1,20.56,0L111,46.15A14.66,14.66,0,0,1,90.46,67.06l-18-17.69-.29,59.17c-.1,19.28-29.42,19-29.33-.25L43.14,50,24.94,67.88Z" />
    </svg>
  </div>
  <div class="main">
    <div class="title-container">
      <div class="title">
        <img class="maskot" src="./mascot.png" />
        <h1>YoFood</h1>
      </div>
      <div class="sheet-dates rect-radios" id="sheetDates"> </div>
    </div>

    <div id="info" style="margin-bottom: 20px; font-size: 20px;">
      👤 <a href="#" id="employeeName" style="text-decoration-style: dotted; color: #000070;"></a>
    </div>

    <div id="settings" class="hidden">
      <div id="uploadContainer">
        <input type="text" id="sheetLinkInput" autocomplete="off" placeholder="Ссылка на Google-таблицу">
        <div class="flex gap-8">
          <button id="uploadBtn">Загрузить</button>
          <button id="closeSettings">Закрыть</button>
          <div id="loader" class="flex flex-stretch invisible">
            <img src="excel.svg" height="32">
            <div class="loader">
              <span>🥪</span>
              <span>🥗</span>
              <span>🍲</span>
              <span>🍗</span>
              <span>🍟</span>
              <span>🧋</span>
              <span>🍰</span>
            </div>
            <img src="fridge.svg" height="62">
          </div>
        </div>
      </div>

      <select id="employeeSelect">
        <option value="">Выберите сотрудника</option>
      </select>

    </div>

    <template id="sheetDate">
      <div class="sheet-date">
        <input type="radio">
        <label></label>
        <div>
          <div class="content"></div>
          <div class="header"></div>
        </div>
      </div>
    </template>

    <div id="selectContainer">
      <div class="select-wrapper">
        <div class="days rect-radios">
          <div>
            <input id="1" type="radio" name="day" value="Пн">
            <label for="1">Пн</label>
          </div>
          <div>
            <input id="2" type="radio" name="day" value="Вт">
            <label for="2">Вт</label>
          </div>
          <div>
            <input id="3" type="radio" name="day" value="Ср">
            <label for="3">Ср</label>
          </div>
          <div>
            <input id="4" type="radio" name="day" value="Чт">
            <label for="4">Чт</label>
          </div>
          <div>
            <input id="5" type="radio" name="day" value="Пт">
            <label for="5">Пт</label>
          </div>
        </div>
      </div>
    </div>

    <div id="jsonDisplay">
      <div class="values-list hidden">
        <div class="meal">
          <input type="checkbox" id="meal1" name="meal" icon="🥪" />
          <label for="meal1" class="meal-name">
            <div></div>
            <div></div>
          </label>
        </div>
        <div class="meal">
          <input type="checkbox" id="meal2" name="meal" icon="🧋" />
          <label for="meal2" class="meal-name">
            <div></div>
            <div></div>
          </label>
        </div>
        <div class="meal">
          <input type="checkbox" id="meal3" name="meal" icon="🍲" />
          <label for="meal3" class="meal-name">
            <div></div>
            <div></div>
          </label>
        </div>
        <div class="meal">
          <input type="checkbox" id="meal4" name="meal" icon="🥗" />
          <label for="meal4" class="meal-name">
            <div></div>
            <div></div>
          </label>
        </div>
        <div class="meal">
          <input type="checkbox" id="meal5" name="meal" icon="🍗" />
          <label for="meal5" class="meal-name">
            <div></div>
            <div></div>
          </label>
        </div>
        <div class="meal">
          <input type="checkbox" id="meal6" name="meal" icon="🍟" />
          <label for="meal6" class="meal-name">
            <div></div>
            <div></div>
          </label>
        </div>
        <div class="meal">
          <input type="checkbox" id="meal7" name="meal" icon="🍰" />
          <label for="meal7" class="meal-name">
            <div></div>
            <div></div>
          </label>
        </div>
      </div>
      <div id="noData" class="hidden"></div>
    </div>

    <div class="error" id="errorDisplay"></div>
  </div>
</body>

</html>
